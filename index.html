<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlash</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #1e3a8a;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.1);
            width: 100%;
            max-width: 850px;
            text-align: center;
        }

        /* Tiered Heading */
        .greeting {
            font-size: 2.2rem; /* Increased size */
            color: #2563eb; /* Matches the 'Generate' button and 'Flash' theme */
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 3rem;
            margin: 5px 0;
            color: #1e40af;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #60a5fa;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Layout for Wide Window */
        .topic-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .selection-group {
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #1e3a8a;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dbeafe;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background: white;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
        }

        button {
            background-color: #2563eb; 
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            height: 48px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        #result {
            margin-top: 30px;
            text-align: left;
            padding: 25px;
            background-color: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            line-height: 1.6;
            display: none;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="greeting">Hola!</p> 
        <h1>Welcome to StudyFlash</h1>
        <p class="subtitle">Learn in a Flash! ⚡</p>

        <form id="studyForm">
            <div class="topic-group">
                <label for="topic">Topic</label>
                <input type="text" id="topic" placeholder="What topic are we flashing through today?" required>
            </div>

            <div class="form-grid">
                <div class="selection-group">
                    <label for="format">Format</label>
                    <select id="format">
                        <option value="paragraph">Paragraph</option>
                        <option value="bullet points">Bullet Points</option>
                        <option value="flowchart">Flowchart</option>
                        <option value="outlines">Outlines</option>
                    </select>
                </div>

                <div class="selection-group">
                    <label for="level">Level</label>
                    <select id="level">
                        <option value="basic">Basic</option>
                        <option value="medium">Medium</option>
                        <option value="advance">Advanced</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn">Generate</button>
            </div>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const studyForm = document.getElementById('studyForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        studyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.innerText = "Analyzing...";
            submitBtn.disabled = true;
            resultDiv.style.display = "none";

            const payload = {
                topic: document.getElementById('topic').value,
                format: document.getElementById('format').value,
                level: document.getElementById('level').value
            };

            try {
                const response = await fetch('http://localhost:4000/study-api/plans', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerText = data.plan;
                    resultDiv.style.display = "block";
                } else {
                    alert("Error: " + data.message);
                }
            } catch (error) {
                alert("Server Connection Failed. Please ensure the backend is active.");
            } finally {
                submitBtn.innerText = "Generate";
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
